name: business_card_app
description: "Business Card App (Flutter + Laravel API)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # =============================
  # UI
  # =============================
  cupertino_icons: ^1.0.8

  # =============================
  # STATE MANAGEMENT
  # =============================
  provider: ^6.1.2

  # =============================
  # NETWORKING
  # =============================
  dio: ^5.4.3
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  url_launcher: ^6.2.5

  # =============================
  # STORAGE (TOKEN)
  # =============================
  flutter_secure_storage: ^9.0.0

  # =============================
  # UTILS
  # =============================
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # =============================
  # CODE GENERATION
  # =============================
  build_runner: ^2.4.8
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0

  # =============================
  # APP ICON
  # =============================
  flutter_launcher_icons: ^0.13.1

# =============================
# FLUTTER CONFIG
# =============================
flutter:
  uses-material-design: true

  assets:
    - assets/images/ABW.png
    - assets/images/login.png
    - assets/images/businessCard4U.png

# =============================
# LAUNCHER ICON CONFIG
# =============================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/businessCard4U.png"
